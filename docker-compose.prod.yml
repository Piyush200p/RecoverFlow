# ============================================================
# RecoverFlow AI — Docker Compose (Production Deployment)
# ============================================================
# Services:
#   redis   — Redis 7 for Celery broker + result backend
#   api     — FastAPI gateway (production API server)
#   worker  — Celery background worker
# ============================================================

services:

  # ── Redis (Local Service Queue) ──────────────────────────
  redis:
    image: redis:7-alpine
    container_name: recoverflow_prod_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-prod_redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # ── FastAPI Gateway ──────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recoverflow_prod_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-prod_redis_password}@redis:6379/0"
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD:-prod_redis_password}@redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD:-prod_redis_password}@redis:6379/1"
      SHOPIFY_API_KEY: "${SHOPIFY_API_KEY}"
      SHOPIFY_API_SECRET: "${SHOPIFY_API_SECRET}"
      BACKEND_API_SECRET: "${BACKEND_API_SECRET}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      WHATSAPP_DEFAULT_ACCESS_TOKEN: "${WHATSAPP_DEFAULT_ACCESS_TOKEN}"
      WHATSAPP_DEFAULT_PHONE_NUMBER_ID: "${WHATSAPP_DEFAULT_PHONE_NUMBER_ID}"
      PYTHONPATH: "/app"
      DEBUG: "false"

  # ── Celery Worker ────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recoverflow_prod_worker
    restart: always
    command: celery -A tasks worker --loglevel=info --concurrency=8 --queues=default,recovery
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-prod_redis_password}@redis:6379/0"
      CELERY_BROKER_URL: "redis://:${REDIS_PASSWORD:-prod_redis_password}@redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD:-prod_redis_password}@redis:6379/1"
      SHOPIFY_API_KEY: "${SHOPIFY_API_KEY}"
      SHOPIFY_API_SECRET: "${SHOPIFY_API_SECRET}"
      BACKEND_API_SECRET: "${BACKEND_API_SECRET}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      WHATSAPP_DEFAULT_ACCESS_TOKEN: "${WHATSAPP_DEFAULT_ACCESS_TOKEN}"
      WHATSAPP_DEFAULT_PHONE_NUMBER_ID: "${WHATSAPP_DEFAULT_PHONE_NUMBER_ID}"
      PYTHONPATH: "/app"

volumes:
  redisdata:
    driver: local
